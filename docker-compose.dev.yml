version: "3.9"

services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    environment:
      QUANTPILOT_PROFILE: docker-dev
      QUANTPILOT_API_HOST: 0.0.0.0
      QUANTPILOT_API_PORT: 8000
      QUANTPILOT_DATA_DIR: /app/backend/data
      QUANTPILOT_RUNS_DIR: /app/backend/data/runs
      QUANTPILOT_MARKET_DIR: /app/backend/data/market
      QUANTPILOT_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
    ports:
      - "8000:8000"
    command: >-
      bash -lc "pip install --no-cache-dir -e .[dev] &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    environment:
      VITE_PROFILE: docker-dev
      VITE_API_BASE_URL: ""
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    command: >-
      sh -lc "npm install --no-audit --no-fund &&
      npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
